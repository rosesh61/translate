<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문서 번역기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1e293b;
    }

    header p {
      color: #64748b;
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 28px;
      width: 100%;
      max-width: 900px;
      margin-bottom: 20px;
    }

    .lang-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .lang-row label {
      font-weight: 600;
      color: #475569;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    select {
      padding: 8px 14px;
      border: 1.5px solid #cbd5e1;
      border-radius: 8px;
      font-size: 0.95rem;
      background: white;
      color: #1e293b;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus {
      outline: none;
      border-color: #6366f1;
    }

    .swap-btn {
      background: #f1f5f9;
      border: 1.5px solid #cbd5e1;
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 1rem;
      color: #475569;
      transition: all 0.2s;
    }

    .swap-btn:hover {
      background: #e2e8f0;
      color: #1e293b;
    }

    .text-area-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 600px) {
      .text-area-row { grid-template-columns: 1fr; }
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-label {
      font-weight: 600;
      color: #475569;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .char-count {
      font-size: 0.8rem;
      color: #94a3b8;
    }

    textarea {
      width: 100%;
      height: 280px;
      padding: 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #1e293b;
      resize: vertical;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    textarea:focus {
      outline: none;
      border-color: #6366f1;
    }

    textarea[readonly] {
      background: #f8fafc;
      cursor: default;
    }

    .drop-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 10px;
      padding: 18px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #94a3b8;
      font-size: 0.88rem;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #6366f1;
      background: #f0f0ff;
      color: #6366f1;
    }

    .drop-zone input[type="file"] {
      display: none;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 22px;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #6366f1;
      color: white;
    }

    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
      border: 1.5px solid #e2e8f0;
    }

    .btn-secondary:hover { background: #e2e8f0; }

    .btn-copy {
      background: #10b981;
      color: white;
    }

    .btn-copy:hover { background: #059669; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      margin-top: 8px;
    }

    .status-bar.info    { background: #eff6ff; color: #3b82f6; }
    .status-bar.success { background: #f0fdf4; color: #16a34a; }
    .status-bar.error   { background: #fef2f2; color: #dc2626; }
    .status-bar.loading { background: #fafafa; color: #6b7280; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #d1d5db;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .tip {
      font-size: 0.8rem;
      color: #94a3b8;
      padding: 8px 0 0;
      line-height: 1.5;
    }

    .api-note {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: #92400e;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<header>
  <h1>📄 문서 번역기</h1>
  <p>텍스트를 입력하거나 .txt 파일을 업로드하세요</p>
</header>

<div class="card">
  <!-- 언어 선택 -->
  <div class="lang-row">
    <label>원본 언어</label>
    <select id="srcLang">
      <option value="ko">한국어</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="zh">中文</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="auto">자동 감지</option>
    </select>

    <button class="swap-btn" onclick="swapLangs()" title="언어 교환">⇄</button>

    <label>번역 언어</label>
    <select id="tgtLang">
      <option value="en">English</option>
      <option value="ko">한국어</option>
      <option value="ja">日本語</option>
      <option value="zh">中文</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
    </select>
  </div>

  <!-- 텍스트 영역 -->
  <div class="text-area-row">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">원본</span>
        <span class="char-count" id="srcCount">0자</span>
      </div>
      <textarea id="srcText" placeholder="번역할 텍스트를 여기에 입력하거나, 아래에서 파일을 올려주세요..." oninput="updateCount()"></textarea>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">번역 결과</span>
        <span class="char-count" id="tgtCount">0자</span>
      </div>
      <textarea id="tgtText" readonly placeholder="번역 결과가 여기에 표시됩니다..."></textarea>
    </div>
  </div>

  <!-- 파일 업로드 -->
  <div style="margin-top: 16px;">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".txt,.md,.csv,.json,.html,.js,.py,.ts" onchange="handleFile(event)" />
      📂 클릭하거나 파일을 여기로 드래그하세요 (.txt, .md, .csv, .json, .html 등 텍스트 파일)
    </div>
  </div>

  <!-- 버튼 -->
  <div class="actions" style="margin-top: 16px;">
    <button class="btn btn-primary" id="translateBtn" onclick="translate()">🌐 번역하기</button>
    <button class="btn btn-secondary" onclick="clearAll()">🗑 초기화</button>
    <button class="btn btn-copy" onclick="copyResult()" id="copyBtn" style="display:none">📋 결과 복사</button>
    <button class="btn btn-secondary" onclick="downloadResult()" id="downloadBtn" style="display:none">💾 결과 저장</button>
  </div>

  <div id="statusBar" style="display:none" class="status-bar info"></div>

  <p class="tip">
    💡 MyMemory 무료 API를 사용합니다 — API 키 불필요, 하루 약 5,000단어 번역 가능<br>
    긴 문서는 자동으로 나누어 번역합니다.
  </p>
</div>

<script>
  const CHUNK_SIZE = 450; // 글자 단위 (MyMemory 제한 고려)

  function updateCount() {
    const src = document.getElementById('srcText').value;
    document.getElementById('srcCount').textContent = src.length + '자';
  }

  function setStatus(msg, type = 'info', loading = false) {
    const bar = document.getElementById('statusBar');
    bar.style.display = 'flex';
    bar.className = 'status-bar ' + type;
    bar.innerHTML = loading
      ? `<div class="spinner"></div> ${msg}`
      : msg;
  }

  function hideStatus() {
    document.getElementById('statusBar').style.display = 'none';
  }

  function swapLangs() {
    const s = document.getElementById('srcLang');
    const t = document.getElementById('tgtLang');
    const sv = s.value, tv = t.value;
    if (sv === 'auto') return;
    s.value = tv;
    t.value = sv;

    const srcText = document.getElementById('srcText');
    const tgtText = document.getElementById('tgtText');
    if (tgtText.value) {
      srcText.value = tgtText.value;
      tgtText.value = '';
      updateCount();
    }
  }

  function clearAll() {
    document.getElementById('srcText').value = '';
    document.getElementById('tgtText').value = '';
    document.getElementById('tgtCount').textContent = '0자';
    document.getElementById('copyBtn').style.display = 'none';
    document.getElementById('downloadBtn').style.display = 'none';
    updateCount();
    hideStatus();
  }

  async function translateChunk(text, src, tgt) {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API 요청 실패');
    const data = await res.json();
    if (data.responseStatus !== 200) throw new Error(data.responseDetails || '번역 오류');
    return data.responseData.translatedText;
  }

  function splitText(text, size) {
    const chunks = [];
    // 문장 단위로 자르기 시도
    const sentences = text.match(/[^.!?。！？\n]+[.!?。！？\n]*/g) || [text];
    let current = '';
    for (const s of sentences) {
      if ((current + s).length > size && current) {
        chunks.push(current.trim());
        current = s;
      } else {
        current += s;
      }
    }
    if (current.trim()) chunks.push(current.trim());
    return chunks;
  }

  async function translate() {
    const src = document.getElementById('srcText').value.trim();
    if (!src) {
      setStatus('⚠️ 번역할 텍스트를 입력해주세요.', 'error');
      return;
    }

    const srcLang = document.getElementById('srcLang').value;
    const tgtLang = document.getElementById('tgtLang').value;
    const btn = document.getElementById('translateBtn');

    btn.disabled = true;
    setStatus('번역 중...', 'loading', true);
    document.getElementById('tgtText').value = '';
    document.getElementById('copyBtn').style.display = 'none';
    document.getElementById('downloadBtn').style.display = 'none';

    try {
      const chunks = splitText(src, CHUNK_SIZE);
      const results = [];

      for (let i = 0; i < chunks.length; i++) {
        setStatus(`번역 중... (${i + 1}/${chunks.length} 조각)`, 'loading', true);
        const translated = await translateChunk(chunks[i], srcLang, tgtLang);
        results.push(translated);
        // 요청 간격 (속도 제한 방지)
        if (i < chunks.length - 1) await delay(300);
      }

      const result = results.join(' ');
      document.getElementById('tgtText').value = result;
      document.getElementById('tgtCount').textContent = result.length + '자';
      document.getElementById('copyBtn').style.display = 'inline-block';
      document.getElementById('downloadBtn').style.display = 'inline-block';
      setStatus('✅ 번역 완료!', 'success');
    } catch (e) {
      setStatus('❌ 오류: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  function delay(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  function copyResult() {
    const text = document.getElementById('tgtText').value;
    navigator.clipboard.writeText(text).then(() => {
      setStatus('📋 클립보드에 복사되었습니다!', 'success');
    });
  }

  function downloadResult() {
    const text = document.getElementById('tgtText').value;
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '번역결과.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function handleFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('srcText').value = e.target.result;
      updateCount();
      setStatus(`📂 "${file.name}" 파일을 불러왔습니다 (${Math.round(file.size/1024*10)/10} KB)`, 'info');
    };
    reader.onerror = () => setStatus('❌ 파일을 읽을 수 없습니다.', 'error');
    reader.readAsText(file, 'UTF-8');
  }

  // 드래그 앤 드롭
  const dropZone = document.getElementById('dropZone');

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
  });

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('srcText').value = ev.target.result;
        updateCount();
        setStatus(`📂 "${file.name}" 파일을 불러왔습니다`, 'info');
      };
      reader.readAsText(file, 'UTF-8');
    }
  });

  // Ctrl+Enter로 번역
  document.getElementById('srcText').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') translate();
  });
</script>

</body>
</html>
